# Felinid Tail Wagging
- type: entity
  parent: ActionToggleWagging
  id: ActionToggleFelinidWagging
  components:
  - type: Action
    icon: { sprite: _RMC14/Mobs/Felinids, state: tail_wag_icon }
    iconOn: { sprite: _RMC14/Mobs/Felinids, state: tail_wag_icon }
    itemIconStyle: NoItem
    useDelay: 1 # Prevents Emote Spam
  - type: InstantAction
    event: !type:ToggleActionEvent
