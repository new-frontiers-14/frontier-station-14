# hotdogs
- type: constructionGraph
  id: NFHotdog
  start: start
  graph:
  - node: start
    edges:
    - to: hotteddog
      steps:
      - tag: NFHotdog
        name: construction-graph-tag-hotdog
    - to: HotdogWithFermentedSausage
      steps:
      - tag: NFHotdogFermentedSausage
        name: construction-graph-tag-hotdog

  - node: hotteddog
    entity: FoodMealHotdog

  - node: HotdogWithFermentedSausage
    entity: FoodGoblinMealHotdog

- type: constructionGraph
  id: NFHotdogStove
  start: start
  graph:
  - node: start
    edges:
    - to: cookeddog
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 335

  - node: cookeddog
    entity: FoodMeatSausage

# Goblin meal hotdog is made with fermented sausage
- type: constructionGraph
  id: NFSausageFermentedCooking
  start: start
  graph:
  - node: start
    edges:
    - to: CookedFermentedSausage
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 335
  - node: CookedFermentedSausage
    entity: FoodGoblinMeatSausageFermented
