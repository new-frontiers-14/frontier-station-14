- type: constructionGraph
  id: NFGirder
  start: start
  graph:
    - node: start
      edges:
        - to: NFGirder
          completed:
            - !type:SnapToGrid {} # Frontier: use default ctor
              # southRotation: true # Frontier                 
          steps:
            - material: Steel
              amount: 2
              doAfter: 1
          
    - node: NFGirder
      entity: Girder
      edges:          
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 2
            - !type:DeleteEntity {}
          conditions:
            - !type:EntityAnchored
              anchored: false
          steps:
            - tool: Screwing
              doAfter: 2

        - to: reinforcedNFGirder
          completed:
            - !type:SnapToGrid
              southRotation: false
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: Plasteel
              amount: 2
              doAfter: 1    

        - to: asteroidrock
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored {}
          steps:
            - material: FloorTileItemAstroAsteroidSand
              amount: 2
              doAfter: 1             
            - material: Steel
              amount: 2
              doAfter: 1

    - node: reinforcedNFGirder
      entity: ReinforcedGirder
      edges:
        - to: asteroidcobblebrick
          completed:
            - !type:SnapToGrid
              southRotation: true
          conditions:
            - !type:EntityAnchored { }
          steps:
            - material: FloorTileItemAstroAsteroidSand
              amount: 2
              doAfter: 1             
            - material: Steel
              amount: 2
              doAfter: 1          
            - material: Plasteel
              amount: 2
              doAfter: 1

    - node: asteroidrock
      entity: AsteroidRockFascade
      edges:
        - to: NFGirder
          completed:
            - !type:GivePrototype
              prototype: FloorTileItemAstroAsteroidSand
              amount: 2     
              prototype: SheetSteel1
              amount: 2                                       
          steps:
            - tool: Welding
              doAfter: 10

    - node: asteroidcobblebrick
      entity: WallAsteroidCobblebrick
      edges:
        - to: reinforcedGirder                     
          completed:
            - !type:GivePrototype
              prototype: FloorTileItemAstroAsteroidSand
              amount: 2     
              prototype: SheetSteel1
              amount: 2
              prototype: SheetPlasteel1
              amount: 2                         
          steps:
            - tool: Welding
              doAfter: 10           
