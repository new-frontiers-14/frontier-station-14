      edges:
        - to: CatwalkHazard
          completed:
            - !type:SnapToGrid
              southRotation: true
          steps:
            - material: MetalRod
              amount: 2

    - node: CatwalkHazard
      entity: CatwalkHazard
      edges:
        - to: start
          completed:
          - !type:SpawnPrototype
