- type: job
  id: NFPirate
  name: job-name-nf-pirate
  description: job-description-nf-pirate
  playTimeTracker: JobPirate
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 86400 # 24 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 10800 # 3 hrs
  startingGear: NFPirateGear
  alwaysUseSpawner: true
  hideConsoleVisibility: true
  canBeAntag: true
  icon: "JobIconNFPirate"
  supervisors: job-supervisors-nf-pirate
  weight: 20
  displayWeight: 20
  setPreference: true
  newPlayerMessage: false
  access:
  - Pirate
  accessGroups:
  - GeneralAccess
  special:
  - !type:AddComponentSpecial
    components:
    - type: AutoPirate
    - type: SpecialSectorStationRecord # must be given on spawn
      recordGeneration: FalseRecord
    - type: DisableSuitSensors
  - !type:AddImplantSpecial
    implants: [ FreelanceTrackingImplant ]
  - !type:GiveItemOnHolidaySpecial # Even pirates get a piece of cake.
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

#Interview variant
- type: job
  id: NFPirateInterview
  name: job-name-nf-pirate-interview
  description: job-description-nf-pirate
  playTimeTracker: JobNFPirateInterview
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 86400 # 24 hours
  - !type:DepartmentTimeRequirement
    department: Security
    time: 10800 # 3 hrs
  setPreference: false
  startingGear: NFPirateHologramGear
  alwaysUseSpawner: true
  icon: "JobIconNFPirate"
  supervisors: job-supervisors-nf-pirate
  access:
  - Pirate
  accessGroups:
  - GeneralAccess
  jobEntity: InterviewHologramPirate
  newPlayerMessage: false

- type: startingGear
  id: NFPirateHologramGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitPirate
    belt: ClothingBeltUtility
    pocket1: BasePirateUplinkPirateCrew
  storage:
    back:
    - AppraisalTool

- type: chameleonOutfit
  id: NFPirateChameleonOutfit
  job: NFPirate
