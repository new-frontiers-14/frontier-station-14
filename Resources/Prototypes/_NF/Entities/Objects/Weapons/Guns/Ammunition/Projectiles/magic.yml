#region Bullets
- type: entity
  parent: BaseBulletTrigger
  id: NFBulletMagicIceBoltMob
  categories: [ HideSpawnMenu ]
  name : ice bolt
  components:
  - type: Projectile
    damage:
      types:
        Cold: 6
    soundHit:
      collection: WeakHit
    forceSound: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: ice
      shader: unshaded
  - type: Ammo
    muzzleFlash: null

- type: entity
  parent: NFBulletMagicIceBoltMob
  id: NFBulletMagicIceBoltStaffAdept
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Cold: 16
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  parent: NFBulletMagicIceBoltMob
  id: NFBulletMagicIceBoltStaffMaster
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Cold: 24
    soundHit:
      collection: WeakHit
    forceSound: true

- type: entity
  parent: BaseBulletTrigger
  id: NFBulletMagicFireBoltMob
  categories: [ HideSpawnMenu ]
  name: fire bolt
  components:
  - type: Projectile
    damage:
      types:
        Heat: 4
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: blastwave
  - type: Ammo
    muzzleFlash: null
  - type: IgniteOnCollide
    fireStacks: 2

- type: entity
  parent: NFBulletMagicFireBoltMob
