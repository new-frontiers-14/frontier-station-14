- type: entity # For t-rex
  parent: BaseBullet
  id: BulletTRexRoar
  categories: [ HideSpawnMenu ]
  name: t-rex roar
  components:
  - type: StaminaDamageOnCollide
    damage: 100
  - type: Projectile
    damage:
      types:
        Asphyxiation: 0
    angle: 180
    impactEffect: null
    soundHit: null
  - type: Sprite
    noRot: false
    sprite: _NF/Effects/sonic_wave.rsi
    layers:
    - state: icon
      color: "#0099ff"
      shader: unshaded
  - type: Ammo
    muzzleFlash: null

