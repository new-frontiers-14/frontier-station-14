  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Heat: 22
  - type: IgniteOnCollide
    fireStacks: 1

- type: entity # low values because the damage bypasses armor
  parent: BaseBulletTrigger
