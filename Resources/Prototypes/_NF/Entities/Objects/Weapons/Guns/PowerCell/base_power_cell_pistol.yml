#region frame
- type: entity
  abstract: true
  parent: [ NFBaseWeaponEncumbrancePistol, NFBaseGunMeleeAttackLow, BaseWeaponPowerCellSmall ]
  id: NFBaseWeaponFramePowerCellPistol
  suffix: Frontier
  components:
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: Gun
    projectileSpeed: 30
    minAngle: 1.8
    maxAngle: 9
    angleIncrease: 0.5
    angleDecay: 2.5
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: StaticPrice
    price: 250
  - type: NFWeaponDetails
    class: weapon-details-class-pistol

#region manufacturer
- type: entity
  id: NFBaseWeaponFramePowerCellPistolNanotrasen
  parent: NFBaseWeaponFramePowerCellPistol
  abstract: true
  components:
  - type: Gun
    minAngle: 2.1
    maxAngle: 10.5
    angleIncrease: 0.7
    angleDecay: 2.4
    fireRate: 2.6
  - type: NFWeaponDetails
    class: weapon-details-manufacturer-nanotrasen-munitions
