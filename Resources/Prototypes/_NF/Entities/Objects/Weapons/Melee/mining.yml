# region base nanotracen crushers
# compared to the base game version: less damage, no leech, flashlight requires power cell, dagger can be used as screwdriver
- type: entity
  abstract: true
  parent: [ BaseItem, BaseC1Contraband ]
  id: NFBaseWeaponCrusher
  suffix: Frontier
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Sprite
    layers:
    - state: icon
    - state: icon-light
      shader: unshaded
      visible: false
      map: [ "light" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        light:
          True: { visible: true }
          False: { visible: false }
  - type: ToggleableVisuals
    spriteLayer: light
    #inhandVisuals: # sadly breacks on wielding, keeping this as a TODO: figure out something for wielded state
      #left:
      #- state: inhand-left-light
        #shader: unshaded
      #right:
      #- state: inhand-right-light
        #shader: unshaded
    clothingVisuals:
      back:
      - state: equipped-BACKPACK-light
        shader: unshaded
      suitstorage:
      - state: equipped-SUITSTORAGE-light
        shader: unshaded
  - type: ItemTogglePointLight
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: radiating
      interpolate: Linear
      maxDuration: 2.0
      startValue: 3.0
      endValue: 2.0
      isLooped: true
      reverseWhenFinished: true
    - !type:PulseBehaviour
      id: blinking
      interpolate: Nearest
      maxDuration: 1.0
      startValue: 0.1
      endValue: 2.0
      isLooped: true
  # A dirty workaround that allows to have both toggleble light visuals and an action button
  # As lame as it is, this gives the glaive a selfrecharging battery
  - type: Battery # Apparently visualizers for lights don't work without batteries. Bummer.
    maxCharge: 10 #lights drain 3/s but recharge of 2 makes this 1/s. Therefore 600 is 10 minutes of light.
    startingCharge: 10
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 3 #recharge of 2 makes total drain 1w / s so max charge is 1:1 with time. Time to fully charge should be 5 minutes. Having recharge gives light an extended flicker period which gives you some warning to return to light area.
  - type: PointLight
    enabled: false
    netsync: false
    color: "#ffeead"
    radius: 4
  - type: DisarmMalus

# region basic crushers
- type: entity
  parent: NFBaseWeaponCrusher
  id: NFWeaponCrusherAxe
  name: crusher axe
  description: A strong and durable mining tool with built-in light. Can be used as a crowbar in a pinch.
  components:
  - type: Tag
    tags:
    - Crowbar
    - Flashlight
    - Pickaxe
  - type: Prying
  - type: Tool
    qualities:
    - Prying
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Sprite
    sprite: _NF/Objects/Weapons/Melee/crusher_axe.rsi
    state: icon
  - type: Item
    size: Ginormous
    sprite: Objects/Weapons/Melee/crusher-inhands.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Melee/crusher_axe.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: UseDelay
    delay: 0.9
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 5
        Slash: 3
    soundHit:
      collection: MetalThud
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Slash: 2
        Structural: 35
  - type: Construction
    graph: NFWeaponCrusherAxeCorrupted
    node: start
    deconstructionTarget: null

- type: entity
  parent: NFWeaponCrusherAxe
  id: NFWeaponCrusherGlaive
  name: crusher glaive
  components:
  - type: Sprite
    sprite: _NF/Objects/Weapons/Melee/crusher_glaive.rsi
  - type: Item
    sprite: Objects/Weapons/Melee/crusher_glaive-inhands.rsi
    size: Ginormous
  - type: Clothing
    sprite: _NF/Objects/Weapons/Melee/crusher_glaive.rsi
  - type: MeleeWeapon
    attackRate: 1
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 3
        Slash: 5
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 2
        Slash: 5
        Structural: 25
  - type: EmbeddableProjectile
    offset: -0.15,0.0
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.40,-0.30
            - -0.30,-0.40
            - 0.40,0.30
            - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 3
        Slash: 7
        Structural: 10
  - type: Construction
    graph: NFWeaponCrusherGlaiveCorrupted
    node: start
    deconstructionTarget: null

- type: entity
  parent: [ BaseKnife, NFBaseWeaponCrusher, BaseC1Contraband ]
  id: NFWeaponCrusherDagger
  name: crusher dagger
  description: A strong and durable salvager tool with built-in light. Can be used as a screwdriver in a pinch.
  suffix: Frontier
  components:
  - type: Tag
    tags:
    - CombatKnife
    - Flashlight
    - Knife
  - type: Sprite
    sprite: _NF/Objects/Weapons/Melee/crusher_dagger.rsi
  - type: Item
    sprite: _NF/Objects/Weapons/Melee/crusher_dagger.rsi
    storedRotation: -45
  - type: Clothing
    sprite: _NF/Objects/Weapons/Melee/crusher_dagger.rsi
    quickEquip: false
    slots:
    - belt
    - Back
    - suitStorage
    clothingVisuals:
      back:
      - state: equipped-BELT
      belt:
      - state: equipped-BELT
      suitstorage:
      - state: equipped-BELT
  - type: MeleeWeapon
    autoAttack: true
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Slash: 8
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 10
  - type: ThrowingAngle
    angle: 225
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          radius: 0.01
          vertices:
          - -0.4,-0.2
          - -0.2,-0.4
          - 0.4,0.2
          - 0.2,0.4
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: ToggleableVisuals
    spriteLayer: light
    inhandVisuals:
      left:
      - state: inhand-left-light
        shader: unshaded
      right:
      - state: inhand-right-light
        shader: unshaded
    clothingVisuals:
      back:
      - state: equipped-BELT-light
        shader: unshaded
      belt:
      - state: equipped-BELT-light
        shader: unshaded
      suitstorage:
      - state: equipped-BELT-light
        shader: unshaded
  - type: Construction
    graph: NFWeaponCrusherDaggerCorrupted
    node: start
    deconstructionTarget: null

