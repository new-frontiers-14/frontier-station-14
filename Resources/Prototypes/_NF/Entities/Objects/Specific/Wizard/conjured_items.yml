#region Limited life times
- type: entity
  abstract: true
  id: ConjuredObject10
  suffix: Conjured
  description: A magically created entity, that'll vanish from existence eventually.
  components:
  - type: TimedDespawn
    lifetime: 10

- type: entity
  abstract: true
  parent: ConjuredObject10
  id: ConjuredObject30
  components:
  - type: TimedDespawn
    lifetime: 30

- type: entity
  abstract: true
  parent: ConjuredObject10
