
# region Base
# Standardised sizes of goblin food for ease of adjusting the values
- type: entity
  abstract: true
  id: NFBaseFoodGoblinMealEasy # Easy recipes, low volumes of reagents; used FoodSnackBase as a baseline
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
        - ReagentId: Vitamin
          Quantity: 2
        - ReagentId: Goblinol
          Quantity: 2

- type: entity
  abstract: true
  id: NFBaseFoodGoblinMealFine # Slightly more complex recipes, medium volumes of reagents; used FoodMealBase as a baseline
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 35
        reagents:
        - ReagentId: Nutriment
          Quantity: 12
        - ReagentId: Vitamin
          Quantity: 2
        - ReagentId: Goblinol
          Quantity: 5

- type: entity
  abstract: true
  id: NFBaseFoodGoblinMealLavish # Complex recipes (or use rare ingredients), higher volumes of reagents; eyeballed the values
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 45
        reagents:
        - ReagentId: Nutriment
          Quantity: 16
        - ReagentId: Vitamin
          Quantity: 4
        - ReagentId: Goblinol
          Quantity: 10
# endregion Base

# region Meals
- type: entity
  parent: [NFBaseFoodGoblinMealEasy, FoodMeatCooked]
  id: FoodMeatRatCooked
  name: grilled rat
  description: A cooked rat.
  components:
  - type: GoblinMade
  - type: Sprite
    sprite: _NF/Objects/Consumable/Food/meat.rsi
    layers:
    - state: rat-meat-cooked
  - type: Construction
    graph: GrilledRat
    node: FoodMeatRatCooked
  - type: FoodSequenceElement
    entries:
      Burger: GrilledRat
      Taco: GrilledRat

- type: entity
  parent: [NFBaseFoodGoblinMealFine, FoodBowlBase]
  id: FoodGoblinSpaceTickGoulash
  name: space tick goulash
  description: It glows at the input and output.
  components:
  - type: GoblinMade
  - type: FlavorProfile
    flavors:
    - oily
    - meaty
    - spices
  - type: Sprite
    sprite: _NF/Objects/Consumable/Food/bowl.rsi
    layers:
    - state: bowl
    - state: goblin-tick-stew
    - state: goblin-tick-stew-glow
      shader: unshaded
  - type: Tag
    tags:
    - Meat

- type: entity
