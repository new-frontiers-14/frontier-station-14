#Saucer

# Saucer

- type: entity
  name: saucer
  parent: BaseItem
  id: ServiceSaucer
  description: A dainty plate for your tea cup.
  components:
  - type: Sprite
    sprite: _NF/Objects/Consumable/Food/saucer.rsi
    state: saucer
  - type: Item
    shape:
    - 0,0,1,0
    storedOffset: 0, -4
    inhandVisuals:
      left:
      - state: saucer-inhand-left
      right:
      - state: saucer-inhand-right
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 5
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -8
      - !type:SpawnEntitiesBehavior
        spawn:
          FoodPlateSmallTrash:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Tag
    tags:
    - Trash
  - type: PhysicalComposition
    materialComposition:
      Glass: 13
  - type: SpaceGarbage
  - type: StaticPrice # Frontier
    price: 4.5 # Frontier
  - type: NFCookware # Frontier
