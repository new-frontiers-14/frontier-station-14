#region base
- type: entity
  abstract: true
  parent: FoodInjectableBase
  id: FoodSpoiledMoldy
  name: moldy food
  description: "It's probably still edible, just need to scrape this thing off. And this one too. And this one."
  components:
  - type: FlavorProfile
    flavors:
    - bitter
    - terrible
    - mushroom
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 1
        - ReagentId: Mold
          Quantity: 6
        - ReagentId: Toxin # Added toxin because as it turns out the mold is bad only for humans - species with animal organs were able to eat it just fine
          Quantity: 4

- type: entity
  abstract: true
  parent: FoodInjectableBase
  id: FoodSpoiledRotten
  name: rotten food
  description: "It's probably still edible, just need to scrape this thing off. And this one too. And this one."
  components:
  - type: FlavorProfile
    flavors:
    - bitter
    - terrible
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 15
        reagents:
        - ReagentId: Nutriment
          Quantity: 4
        - ReagentId: Vitamin
          Quantity: 1
        - ReagentId: Toxin # GastroToxin<Toxin replaced gastrotoxin with toxin because goblins no longer can be poisoned by gastrotoxin, lowered the quantity due to toxin being more potent than gastrotoxin
          Quantity: 4

#region rotten food
- type: entity
