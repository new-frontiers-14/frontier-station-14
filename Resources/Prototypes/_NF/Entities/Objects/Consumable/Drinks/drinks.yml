#region condiment cup
- type: entity
  parent: DrinkWaterCup
  id: CondimentCup
  name: condiment cup
  description: A flimsy cup that can be filled with condiments. Warranty void if filled with other things.
  components:
  - type: Sprite
    sprite: _NF/Objects/Consumable/Drinks/condiment_cup.rsi
  - type: Clothing
    sprite: _NF/Clothing/Head/Hats/condiment_cup.rsi
  - type: CondimentCup
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 10
  - type: NFIngredient

#region imp coffee cup
- type: entity
  parent: DrinkBase
  id: DrinkDisposableCup
  name: disposable cup
  components:
  - type: PhysicalComposition
    materialComposition:
      Cardboard: 25
  - type: ExaminableSolution
    solution: drink
  - type: FitsInDispenser
    solution: drink
  - type: Tag
    tags:
      - DrinkGlass
  - type: Sprite
    sprite: _NF/Objects/Consumable/Drinks/coffeecup.rsi
    state: icon
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Appearance
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30

- type: entity
  parent: DrinkDisposableCup
