- type: entity
  parent: [BaseItem, BartenderMixer]
  id: DrinkIceBucketEmpty
  name: ice bucket
  suffix: Empty
  description: A special bucket that was specifically designed to hold ice.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 200
  - type: Sprite
    sprite: Objects/Consumable/Drinks/icebucket.rsi
    state: icon
  - type: PhysicalComposition
    materialComposition:
      Steel: 50

- type: entity
  parent: DrinkShaker
  id: DrinkShakerBluespace
  name: bluespace shaker
  description: The trusty mixing buddy of the bartender, now in shining blue!
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 1000
  - type: Sprite
    sprite: _NF/Objects/Consumable/Drinks/shaker_bluespace.rsi
    layers:
      - state: shakerbluespace
  - type: Item
    sprite: _NF/Objects/Consumable/Drinks/shaker_bluespace.rsi