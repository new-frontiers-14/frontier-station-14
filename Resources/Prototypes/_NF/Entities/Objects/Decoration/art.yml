# region posters base
- type: entity
  abstract: true
  parent: BaseItem
  id: NFBasePoster
  name: poster
  description: A rolled up poster. You won't be sure what the design is until you put it up on the wall.
  components:
  - type: Sprite
    sprite: Structures/Wallmounts/posters.rsi
    state: rolled_legit
  - type: Item
    sprite: _NF/Objects/Decoration/posters.rsi
  - type: NFWallmountable
    spawn: RandomPosterAny
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
          params:
            volume: -4
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  abstract: true
  parent: NFBasePoster
  id: NFPosterRolledLegit
  description: A rolled up Nanotrasen-approved poster.
  suffix: rolled
  components:
  - type: Sprite
    sprite: _NF/Objects/Decoration/posters.rsi
    state: rolled_blue
  - type: StaticPrice
    price: 500

- type: entity
  abstract: true
  parent: [BaseC3ContrabandUnredeemable, NFBasePoster]
  id: NFPosterRolledContraband
  description: A rolled up contraband poster.
  suffix: rolled
  components:
  - type: Sprite
    state: rolled_contraband
  - type: StaticPrice
    price: 750

# region posters random
- type: entity
  parent: NFPosterRolledLegit
