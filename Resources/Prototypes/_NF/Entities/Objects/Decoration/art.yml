# region paintings base
- type: entity
  abstract: true
  parent: BaseItem
  id: NFBasePaintingCurtained
  name: painting
  description: A masterpiece hidden under cloth.
  components:
  - type: Sprite
    sprite: _NF/Objects/Decoration/paintings.rsi
    state: painting
  - type: MultiHandedItem
  - type: Item
    size: Ginormous
  - type: Damageable
    damageContainer: Inorganic
  - type: DamageExaminable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
  - type: MeleeWeapon
    attackRate: 0.5
    soundHit:
      collection: MetalThud
    damage:
      types:
        Blunt: 10
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 4
  - type: DamageOnHit
    damage:
      types:
        Blunt: 4
  - type: DamageOnLand
    damage:
      types:
        Blunt: 20
  - type: EmitSoundOnLand
    sound:
      collection: MetalThud
      params:
        variation: 0.25
  - type: StaticPrice
    price: 1000

