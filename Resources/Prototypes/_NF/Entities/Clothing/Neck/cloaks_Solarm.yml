- type: entity
  parent: [ ClothingNeckBase, BaseC1Contraband ]
  id: ClothingNeckLinenCape
  name: linen cape
  suffix: Solarm
  description: Shoulder cape from linen, what can cover you in scorching summers. Sometimes this cape used like wrap.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Neck/Cloaks/Solarm/linencape.rsi

- type: entity
  parent: [ ClothingNeckBase, BaseC1Contraband ]
  id: ClothingNeckLinenCloak
  name: Linen cloak
  suffix: Solarm
  description: Old, light cloak from linen for protect your shoulders and neck from sand, dust, and sun.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Neck/Cloaks/Solarm/linencloak.rsi
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodLinenCloak
    requiredSlot:
    - neck
    slot: head
  - type: ContainerContainer
    containers:
      toggleable-clothing: !type:ContainerSlot {}

- type: entity
  parent: [ ClothingNeckBase, BaseC1Contraband ]
  id: ClothingNeckLinenPoncho
  name: Linen poncho
  suffix: Solarm
  description: Brown-colored linen poncho who can cover you body and neck with style, looks like it very old, but strangely, still has no holes, patches, or scarfs
  components:
  - type: Sprite
    sprite: _NF/Clothing/Neck/Cloaks/Solarm/linenponcho.rsi