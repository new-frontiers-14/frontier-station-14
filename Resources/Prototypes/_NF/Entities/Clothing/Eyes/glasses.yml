  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/nfsd_glasses.rsi
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/nfsd_glasses.rsi

- type: entity
  parent: [ClothingEyesGlassesMeson, BaseCommandContraband]
