# region punk
- type: entity
  parent: [NFBaseClothingWristset, ClothingHeadsetService]
  id: NFClothingWristsetPunkCommon
  name: punk wristset
  components:
  - type: Sprite
    layers:
    - state: icon
      map: [ "wristsetBase" ]
    - state: icon-decal-01
      map: [ "wristsetDecal01" ]
    - state: icon-decal-02
      map: [ "wristsetDecal02" ]
    - state: icon-unshaded
      shader: unshaded
      map: [ "wristsetScreen" ]
    - state: icon-buttons
      map: [ "wristsetButtons" ]
  - type: Clothing
    clothingVisuals:
      ears:
      - state: equipped-EARS
        map: [ "wristsetClothingBase" ]
      - state: equipped-EARS-unshaded
        shader: unshaded
        map: [ "wristsetClothingScreen" ]
  - type: RandomSprite
    available:
      - wristsetBase:
          icon: Base
        wristsetClothingBase:
          equipped-EARS: Base
        wristsetDecal01:
          icon-decal-01: Decor01
          icon-decal-02: Decor01
          mask_null: ""
        wristsetDecal02:
          icon-decal-01: Decor02
          icon-decal-02: Decor02
          mask_null: ""
        wristsetButtons:
          icon-buttons: Decor01
        wristsetScreen:
          icon-unshaded: Decor02
        wristsetClothingScreen:
          equipped-EARS-unshaded: CyberpunkNeon
    mappedColors:
      Base: Cyberpunk
      Decor01: CyberpunkNeon
      Decor02: CyberpunkNeon

