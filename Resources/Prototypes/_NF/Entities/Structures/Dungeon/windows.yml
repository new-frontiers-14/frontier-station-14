# Special windows for dungeons that block lasers
# Base
- type: entity
  id: WindowMurkyDungeon
  abstract: true
  suffix: Dungeon only, DO NOT MAP
  # categories: [ DoNotMap ] # FIXME - shouldn't be mapped on shuttles/POIs, bluespace events might be fine
  description: A murky glass window, it's hard to see what's on the other side.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb {}
        mask:
        - FullTileMask
        layer:
        - WallLayer # Blocks lasers, but not LoS

- type: entity
  id: WindowDirectionalMurkyDungeon
  abstract: true
  suffix: Dungeon only, DO NOT MAP
  # categories: [ DoNotMap ] # FIXME - shouldn't be mapped on shuttles/POIs, bluespace events might be fine
  description: A murky glass window, it's hard to see what's on the other side.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.36"
        density: 1500
        mask:
        - FullTileMask
        layer:
        - WallLayer # Blocks lasers, but not LoS

# Common window
- type: entity
  id: WindowDungeon
  parent:
  - WindowMurkyDungeon
  - Window
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _NF/Structures/Windows/window.rsi
    color: "#ffd38c"
  - type: Icon
    sprite: _NF/Structures/Windows/window.rsi
    state: full

# Reinforced window
- type: entity
  id: ReinforcedWindowDungeon
  parent:
  - WindowMurkyDungeon
  - ReinforcedWindow
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _NF/Structures/Windows/reinforced_window.rsi
    color: "#ffd38c"
  - type: Icon
    sprite: _NF/Structures/Windows/reinforced_window.rsi

# Mining window
- type: entity
  id: MiningWindowDungeon
  parent:
  - WindowMurkyDungeon
  - MiningWindow
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: Structures/Windows/mining.rsi
    color: "#ffd38c"
  - type: Icon
    sprite: Structures/Windows/mining.rsi
  - type: Destructible # Made it as durable as common window
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

