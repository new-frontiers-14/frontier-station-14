# Special glass airlocks for dungeons that block lasers
# Base
- type: entity
  id: AirlockGlassMurkyDungeon
  abstract: true
  suffix: Dungeon only, DO NOT MAP
  # categories: [ DoNotMap ] # FIXME - shouldn't be mapped on shuttles/POIs, bluespace events might be fine
  description: An airlock with murky glass windows, it's hard to see what's on the other side.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - AirlockLayer # Blocks lasers, but not LoS

# Basic airlock
- type: entity
  id: AirlockGlassDungeon
  parent:
  - AirlockGlassMurkyDungeon
  - AirlockGlass

# Maint airlock
- type: entity
  id: AirlockMaintGlassLockedDungeon
  parent:
  - AirlockGlassMurkyDungeon
  - AirlockMaintGlassLocked

