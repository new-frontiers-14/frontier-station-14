- type: entity
  id: FrontierCargoPallet
  name: frontier cargo pallet
  description: Designates valid items to sell to CentCom when a shuttle is recalled.
  parent: [ BaseStructureDisableToolUse, BaseStructureIndestructible, BaseStructure ]
  components:
    - type: InteractionOutline
    - type: Anchorable
    - type: CollideOnAnchor
    - type: Physics
      canCollide: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.45,-0.45,0.45,0.45"
          density: 15
          mask:
            - MachineMask
    - type: FrontierCargoPallet
    - type: Sprite
      drawdepth: FloorTiles
      layers:
        - sprite: Structures/catwalk.rsi
          state: catwalk_preview
    - type: GuideHelp
      guides:
        - Cargo
