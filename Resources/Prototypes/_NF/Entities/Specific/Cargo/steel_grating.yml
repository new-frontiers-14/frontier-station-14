# A very inefficient way to fancy up your shuttle.
- type: entity
  id: SteelGrating
  name: steel grating
  description: A fancy steel grating to walk over.
  parent: [BaseStructure]
  components:
    - type: InteractionOutline
    - type: Anchorable
    - type: CollideOnAnchor
    - type: Physics
      canCollide: false
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeAabb
            bounds: "-0.45,-0.45,0.45,0.45"
          density: 15
          mask:
            - MachineMask
    - type: Sprite
      drawdepth: FloorTiles
      layers:
        - sprite: Structures/catwalk.rsi
          state: catwalk_preview
