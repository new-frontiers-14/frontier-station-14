#Pibble Color Variation

- type: entity
  parent: MobPibble
  id: MobPibbleBlack
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: pibbleblack
      sprite: _NF/Mobs/Pets/dogs.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: pibbleblack
      Dead:
        Base: pibbleblack_dead


