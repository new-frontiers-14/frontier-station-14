# region boss
- type: entity
  parent: [MobHostileBossBase, NFBaseMobXeno, MobXenoQueen]
  id: NFMobXenoQueen
  categories: [ HideSpawnMenu ]
  suffix: Frontier
  components:
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: SpawnDungeonLootNpcXenoQueen
      amount: 1
  - type: ReplacementAccent
    accent: xeno
  - type: GhostRole
    prob: 1
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-xeno-name
    description: ghost-role-information-xeno-description
    rules: ghost-role-information-xeno-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
