# region base
- type: entity
  abstract: true
  parent: [MobStaminaFodder, MobMovementSpeedModifierMelee, NFMobSimpleHostileBase]
  id: NFBaseMobXeno
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40 # Low value, to allow them to fit through the airlocks
        density: 500 # Low density to reduce the chance of spawning additional loot when recycled in the biomass reclaimer
        mask:
        - MobMask
        layer:
        - MobLayer

# region xenoids
- type: entity
  parent: [NFBaseMobXeno, MobXeno]
  id: NFMobXeno
  categories: [ HideSpawnMenu ]
  suffix: Frontier
  components:
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: SpawnDungeonLootNpcXenoBurrower
      amount: 1

