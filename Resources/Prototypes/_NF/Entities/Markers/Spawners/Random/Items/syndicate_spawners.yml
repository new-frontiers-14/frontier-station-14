- type: entity
  parent: MarkerBase
  id: SpawnDungeonLootSuitStorageUnitsSyndie
  name: random suit storage unit
  suffix: "Loot (Frontier), Syndie"
  components:
  - type: Sprite
    layers:
      - state: green
      - sprite: Structures/Storage/suit_storage.rsi
        state: base
      - sprite: Structures/Storage/suit_storage.rsi
        state: door
      - sprite: _NF/Markers/general.rsi
        state: questionmark
        color: red
  - type: EntityTableSpawner
    offset: 0
    deleteSpawnerAfterSpawn: false
    table: !type:NestedSelector
      tableId: TableDungeonLootSyndicateSuitStorageUnits

