- type: entityTable
  id: TableDungeonLootSyndicateSuitStorageUnits
  table: !type:GroupSelector
    children:
    - weight: 50
      id: SuitStorageEVASyndicateLesser
    - weight: 40
      id: SuitStorageEVASyndicate
    - weight: 9
      id: SuitStorageSyndie
    - weight: 1
      id: SuitStorageEVACarp # Carp'd again

- type: entityTable
  id: TableDungeonLootGeneralVendomatsSyndicate
  table: !type:GroupSelector
    children:
    - weight: 30
      id: VendingMachineCigs
    - weight: 25
      id: VendingMachineSyndieDrobe
    - weight: 20
      id: VendingMachineBoozeSyndicate
    - weight: 10
      id: VendingMachineArcadia
    - weight: 10
      id: VendingMachineChemicalsSyndicate
    - weight: 5
      id: VendingMachineSyndieContraband

- type: entityTable
  id: TableDungeonLootCratesSyndicate
  table: !type:GroupSelector
    children:
    - weight: 5 # Empty
      id: CrateSyndicate
    - weight: 5 # Empty
      id: CrateSyndicateSecure
    - weight: 10 # Fake, 20% chance total to be either empty or a trap
      id: CrateSyndicateTrapped
    - weight: 25
      id: CrateSyndicatePlushies
    - weight: 25
      id: CrateSyndicateToys
    - weight: 15
      id: CrateSyndicateRandom
    - weight: 5
      id: CrateSyndicateMuskets
    - weight: 5
      id: CrateSyndicateRevolvers
    - weight: 5
      id: CrateSyndicatePistols

- type: entityTable
  id: TableDungeonLootCratesSyndicateSecure # Similar to above, but only secure crates
  table: !type:GroupSelector
    children:
    - weight: 10 # Still has a chance to be trapped
      id: CrateSyndicateTrapped
    - weight: 45
      id: CrateSyndicateRandom
    - weight: 15
      id: CrateSyndicateMuskets
    - weight: 15
      id: CrateSyndicateRevolvers
    - weight: 15
      id: CrateSyndicatePistols
