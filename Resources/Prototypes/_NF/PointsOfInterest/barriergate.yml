# Notes:
# Deep player interest point POI.
- type: pointOfInterest
  id: BarrierGate
  parent: BasePOI
  name: 'Barrier Gate'
  minimumDistance: 8500
  maximumDistance: 9500
  # minimumClearance: 8000 # To make sure it doesn't pop in next to the Cove. Offline for now.
  spawnGroup: Required
  gridPath: /Maps/_NF/POI/barriergate.yml
  addComponents:
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true
  - type: SpawningModifier
    id: 'vgroid'
    minimumDistance: 1000
    maximumDistance: 3500
    minimumAngle: 90 # spawn in a semi-annulus oriented towards the centre of the sector
    maximumAngle: 270


- type: gameMap
  id: BarrierGate
  mapName: 'Barrier Gate'
  mapPath: /Maps/_NF/POI/barriergate.yml
  minPlayers: 0
  stations:
    BarrierGate:
      stationProto: StandardFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Barrier Gate'
        - type: StationJobs
          availableJobs: {}
        - type: StationDeadDropHintExempt
