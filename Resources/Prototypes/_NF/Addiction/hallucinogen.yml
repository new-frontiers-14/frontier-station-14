- type: addiction
  id: Hallucinogen
  name: addiction-hallucinogen-name
  defaultReagent: SpaceDrugs
  threshold: 50
  decayRate: 0.5
  checkPeriod: 40s
  withdrawal:
    decayRate: 0.25
    symptoms:
      #cravings
      - min: 2
        max: 29
        probability: 0.1
        rating: 1
        duration: 10
        minTimeSinceHit: 40s
        effects:
          - !type:PopupMessage
            visualType: Medium
            messages:
              - addiction-hallucinogen-crave-low-0 #doubling up on specific ones to make them more likely to appear
              - addiction-hallucinogen-crave-low-0
              - addiction-hallucinogen-crave-low-1
              - addiction-hallucinogen-crave-low-1
              - addiction-hallucinogen-crave-low-2
              - addiction-hallucinogen-crave-low-2
              - addiction-hallucinogen-crave-low-3
              - addiction-hallucinogen-crave-low-3
              - addiction-hallucinogen-crave-low-4
              - addiction-hallucinogen-crave-low-4
              - addiction-symptom-anxiety-low-0
              - addiction-symptom-anxiety-low-1
              - addiction-symptom-depression-low-0
              - addiction-symptom-depression-low-1
              - addiction-symptom-depression-low-2
              - addiction-symptom-headache-low-0
              - addiction-symptom-headache-low-2
      - min: 30
        probability: 0.2
        rating: 10
        duration: 12
        minTimeSinceHit: 30s
        effects:
          - !type:PopupMessage
            visualType: MediumCaution
            messages:
              - addiction-hallucinogen-crave-high-0
              - addiction-hallucinogen-crave-high-0
              - addiction-hallucinogen-crave-high-1
              - addiction-hallucinogen-crave-high-1
              - addiction-hallucinogen-crave-high-2
              - addiction-hallucinogen-crave-high-2
              - addiction-hallucinogen-crave-high-3
              - addiction-hallucinogen-crave-high-3
              - addiction-hallucinogen-crave-high-4
              - addiction-hallucinogen-crave-high-4
              - addiction-symptom-anxiety-high-0
              - addiction-symptom-anxiety-high-1
              - addiction-symptom-depression-high-0
              - addiction-symptom-depression-high-1
              - addiction-symptom-depression-high-2
              - addiction-symptom-headache-high-0
              - addiction-symptom-headache-high-2
      # Fatigue after a big high
      - min: 50
        probability: 0.4
        rating: 80
        duration: 10
        minTimeSinceHit: 120s
        conditions:
          - !type:AddictionThreshold
            minAddiction: 60
        effects:
          - !type:Emote
            emote: Yawn
            showInChat: true
          - !type:ModifyStatusEffect
            effectProto: StatusEffectDrowsiness
            time: 15
            type: Add
