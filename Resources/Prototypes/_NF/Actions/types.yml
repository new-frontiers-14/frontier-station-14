- type: entity
  id: ActionActivateDissonantWhispersImplant
  parent: BaseAction
  name: Dissonant Whispers
  description: Utter unharmonious and disquieting whispers giving form to eldritch horrors.
  components:
  - type: Action
    icon: { sprite: Objects/Fun/bikehorn.rsi, state: icon }
    useDelay: 5
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  parent: BaseImplantAction
  id: ActionActivateWehImplant
  name: Weh
  description: Activates your weh implant, which will produce the signature sound of the green lizard.
  components:
  - type: Action
    icon: { sprite: Objects/Fun/Plushies/lizard.rsi, state: icon }
    useDelay: 1

- type: entity
  parent: BaseMentalAction
  id: ActionToggleAccent
  name: Toggle Accent
  description: Toggle your accent.
  components:
    - type: Action
      #TODO: Repalce these with more specific sprites instead of just using cogni sprites
      icon: {sprite: _NF/Actions/toggle_accent.rsi, state: normal_accent_disabled}
      iconOn: {sprite: _NF/Actions/toggle_accent.rsi, state: cogni_accent_enabled}
      useDelay: 1
    - type: InstantAction
      event: !type:ToggleAccentActionEvent

- type: entity
  parent: ActionToggleAccent
  id: ActionToggleCogniAccent
  name: Toggle Cognizine Accent
  description: Toggle your pre-sapiance accent.
  components:
    - type: Action
      icon: {sprite: _NF/Actions/toggle_accent.rsi, state: cogni_accent_disabled}
      iconOn: {sprite: _NF/Actions/toggle_accent.rsi, state: cogni_accent_enabled}
