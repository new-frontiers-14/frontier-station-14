- type: entity
  id: ActionActivateDissonantWhispersImplant
  parent: BaseAction
  name: Dissonant Whispers
  description: Utter unharmonious and disquieting whispers giving form to eldritch horrors.
  components:
  - type: Action
    icon: { sprite: Objects/Fun/bikehorn.rsi, state: icon }
    useDelay: 5
  - type: InstantAction
    event: !type:ActivateImplantEvent

- type: entity
  parent: BaseImplantAction
  id: ActionActivateWehImplant
  name: Weh
  description: Activates your weh implant, which will produce the signature sound of the green lizard.
  components:
  - type: Action
    icon: { sprite: Objects/Fun/Plushies/lizard.rsi, state: icon }
    useDelay: 1

- type: entity
  parent: BaseMentalAction
  id: ActionTogglePreSapienceAccent
  #TODO: Spellcheck and see if the names could be better.
  name: Toggle Cogni
  description: Toggle your origional, presapience accent.
  - components:
      - type: Action
        #icon: *sprite here*
        #iconOn: *sprite here*
        useDelay: 1
      - type: InstantAction
        event: !type:ToggleCognizineEffect

