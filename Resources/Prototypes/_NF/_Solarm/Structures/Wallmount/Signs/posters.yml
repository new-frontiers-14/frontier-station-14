- type: entity
  parent: PosterBase
  id: PosterSTsun
  name: Sun of the 91-st sector
  suffix: Solarm
  description: "Under the futuristic sun and sunset sky is the inscription «Sun of Solarm Never Sets», and next to it, for some reason, there also a Scrap Tech logo."
  components:
    - type: Sprite
      sprite: _NF/Solarm/Structures/Wallmounts/posters.rsi
      state: poster_stsun

- type: entity
  parent: PosterBase
  id: PosterSTRay
  name: «Liwer» means «Live»
  suffix: Solarm
  description: "An LF promotional poster featuring their anthropomorphic sun mascot, Ray. He,s wearing a baggy purple jacket with a crimson striped waistcoat, his eyes covered by glasses with round, orange glasses. In hand, Ray holds an open bottle of liver."
  components:
    - type: Sprite
      sprite: _NF/Solarm/Structures/Wallmounts/posters.rsi
      state: poster_stliwer

- type: entity
  parent: PosterBase
  id: PosterSTmake91free
  name: «Make 91-st sector free!»
  suffix: Solarm
  description: "A very old, dusty poster of unknown origin calling for people to join the militia and liberate Sector 91...? What,s a Sector 91?"
  components:
    - type: Sprite
      sprite: _NF/Solarm/Structures/Wallmounts/posters.rsi
      state: poster_stfree
