- type: entity
  parent: CrateSyndicateSecure
  id: CrateSyndicateTrapped   # Disguised variant of the secure crate that blows up if you try to break it open
  name: syndicate storage crate
  description: Contains miscellaneous syndicate gear, locked away for safekeeping.
  components:
  - type: AmbientSound
    volume: -14
    range: 2
    enabled: true
    sound:
      path: /Audio/Items/newton_cradle.ogg
  - type: Explosive
    explosionType: Default
    maxIntensity: 30
    totalIntensity: 35
    canCreateVacuum: false
  - type: ExplodeOnTrigger
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30 # Weaker than the 75 health of a normal secure crate
      behaviors:
      - !type:TriggerBehavior
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
