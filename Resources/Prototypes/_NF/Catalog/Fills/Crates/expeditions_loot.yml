- type: entity
  parent: CrateSyndicate
  id: CrateSyndicateToys
  name: syndicate toy crate
  description: Contains an assortment of harmless syndicate toys.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: SyndicateToysCrateTable

- type: entityTable
  id: SyndicateToysCrateTable
  table: !type:AllSelector
    children:
    # Figurines
    - !type:NestedSelector
      prob: 0.5
      rolls: !type:RangeNumberSelector
        range: 1, 4
      tableId: SyndicateFigurinesTable
    # Foam Projectile Weapons
    - !type:NestedSelector
      prob: 0.4
      rolls: !type:RangeNumberSelector
          range: 1, 2
      tableId: FoamWeaponsTable
    # Toys
    - !type:NestedSelector
      rolls: !type:RangeNumberSelector
          range: 1, 2
      tableId: SyndicateToysTable
    # Honk Shoo
    - id: BedsheetSyndie
      prob: 0.1

- type: entityTable
  id: SyndicateFigurinesTable
  table: !type:GroupSelector
    children:
    - id: ToyFigurineNukie
    - id: ToyFigurineNukieElite
    - id: ToyFigurineNukieCommander
    - id: ToyFigurineFootsoldier
    - id: ToyMauler
    - id: ToyDeathRipley
    - id: ToyFigurineGreytider
      weight: 0.05
  
- type: entityTable
  id: FoamWeaponsTable
  table: !type:GroupSelector
    children:
    - !type:AllSelector
      weight: 0.6
      children:
      - !type:GroupSelector
        children:
        - id: FoamCrossbow
        - id: NFWeaponRifleFoam
      - id: NFBoxDonkSoftBox
    - !type:AllSelector
      weight: 0.1
      children:
      - id: WeaponLauncherRocketToy
      - id: BulletFoamRPG
    - id: GrenadeFoamDart
      weight: 0.3
  
- type: entityTable
  id: SyndicateToysTable
  table: !type:GroupSelector
    children:
    - id: ToySword
      weight: 2.5
    - id: FoamBlade
      weight: 0.5
    - id: ToyNuke
    - id: SyndieTrickyBomb
    - id: SpaceBladeContra
    - id: SoapSyndie
      weight: 0.5
    - id: BalloonSyn
      weight: 0.1
    - id: BalloonCommander
      weight: 0.01
    - !type:GroupSelector
      children:
      - id: NFRevolverCapGun
      - id: NFRevolverCapGunFake # """harmless"""
        weight: 0.01

