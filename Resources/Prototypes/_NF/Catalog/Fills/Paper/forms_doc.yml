# Filled Folder
- type: entity
  id: BoxFolderDoc
  parent: BoxFolderBase
  name: director of care form folder
  description: A folder filled with paperwork templates for the Director of Care.
  suffix: Forms
  components:
  - type: Sprite
    layers:
    - state: folder-doc
    - state: folder-base
  - type: StorageFill
    contents:
    - id: PaperWrittenDoCFormPatientInfo
    - id: PaperWrittenDoCFormPrescription
    - id: PaperWrittenDoCFormHealthInsurance
    - id: PaperWrittenDoCFormServiceInvoice
    - id: PaperWrittenDoCFormReceiptInvoice
    - id: PaperWrittenDoCFormRelease
    - id: PaperWrittenDoCNarcoticRestrictedChemPermit
    - id: PaperWrittenDoCResponderContract
    - id: PaperWrittenDoCStaffContract
    - id: Paper
      prob: 0.5
    - id: Paper
      prob: 0.5
  - type: StaticPrice
    price: 100
    vendPrice: 500

