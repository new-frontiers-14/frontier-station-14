- type: entity
  parent: JugBluespace
  id: JugBluespaceMutamix
  components:
    - type: Label
      currentLabel: Mutagen mix, dose at 15u
    - type: SolutionContainerManager
      solutions:
        beaker:
          maxVol: 1000
          reagents:
            - ReagentId: Radium
              Quantity: 300
            - ReagentId: Uranium
              Quantity: 300
            - ReagentId: UnstableMutagen
              Quantity: 300
    - type: SolutionTransfer
      transferAmount: 15

