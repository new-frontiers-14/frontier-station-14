# Shuttle Notes:
# Pure botany ship intended for a crew of 1-3. Includes an industrial reagent grinder.
- type: vessel
  id: Dendron
  parent: BaseVessel
  name: NT Dendron
  description: "An ideal vessel for cultivating and processing plants on a large scale."
  price: 58000 #50805 * 1.15 = 58425.75
  category: Medium
  group: Shipyard
  shuttlePath: /Maps/_NF/Shuttles/dendron.yml
  guidebookPage: ShipyardDendron
  class:
  - Botany
  engine:
  - Uranium

