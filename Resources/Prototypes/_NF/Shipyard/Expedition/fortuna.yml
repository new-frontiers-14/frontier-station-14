- type: vessel
  id: fortuna
  parent: BaseVessel
  name: MAG Fortuna
  description: The Fortuna class ship is a logistics and personnel carrier. Originally a cargo ship, it has seen extensive use as a personnel carrier and strike platform. It has since been decommissioned and replaced by newer, sleeker ships, but it is common on the military surplus market. It is still in frequent use by private ventures, salvagers and explorers, this particular variant has been refitted and modernized by the private military contractor Magnum. Modifications include the overhaul of the crew quarters into a medbay, the salvage bay being repurposed as an armory, as well as an upgrade of the power grid to accomodate an antimatter engine and resistant flux conduits that can withstand the burden of FTL travel. 
  price: 60000
  category: Medium
  group: Expedition
