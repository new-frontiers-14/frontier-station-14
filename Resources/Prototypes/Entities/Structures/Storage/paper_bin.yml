- type: entity
  parent: BaseStructureDynamic
  id: PaperBin
  name: paper bin
  description: What secrets lie at the bottom of its endless stack?
  suffix: Empty
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    state: paper_bin0
    drawdepth: SmallObjects
    noRot: true
  - type: Appearance
  - type: ItemMapper
    sprite: Objects/Misc/bureaucracy.rsi
    mapLayers:
      paper_bin1:
        whitelist:
          tags:
          - Document
          - Write
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.10,0.10,0.10"
        density: 500
        mask:
          - TabletopMachineMask
  - type: InteractionOutline
  - type: Bin
    whitelist:
      tags:
      - Document
      - Write
  - type: ContainerContainer
    containers:
      bin-container: !type:Container
  - type: StaticPrice
    price: 5
  # Frontier
  # i won't add it to the other paper bins as even if they're empty of paper,
  # they'll still give the amount i set. the same applies here but i doubt half a sheet of paper will be a problem.
  - type: PhysicalComposition
    materialComposition:
      Steel: 50 # half a sheet
      Paper: 50 # half a sheet
  # End Frontier

