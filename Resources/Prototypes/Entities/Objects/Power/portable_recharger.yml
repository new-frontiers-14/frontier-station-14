- type: entity
  parent: Clothing
  id: PortableRecharger
  name: portable recharger
  description: High-tech recharger adapted for portability.
  components:
  - type: Item
    size: Ginormous # Frontier Huge<Ginormous
  - type: Sprite
    sprite: Objects/Power/portable_recharger.rsi
    state: charging
  - type: Clothing
    equippedPrefix: charging
    quickEquip: false
    slots:
    - back
    - Belt # Frontier
    - suitStorage #Frontier
    clothingVisuals: #Frontier
      back:
      - state: charging-equipped-BACKPACK
      belt:
      - state: charging-equipped-BACKPACK
      suitstorage:
      - state: charging-equipped-BACKPACK
  - type: Charger
    chargeRate: 50 # Frontier: chargeRate: 50
    slotId: charger_slot
    portable: true
  - type: PowerChargerVisuals
  - type: ApcPowerReceiver
    needsPower: false
    powerLoad: 1 # Frontier: 0<1 (claims to work without power if 0)
  - type: StaticPrice
    price: 500
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: ContainerContainer
    containers:
      charger_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      charger_slot:
        # ejectOnInteract: true # Frontier: In a fit of irony, this prevents you drawing the item in the slot by interacting.
        whitelist:
          components:
          - HitscanBatteryAmmoProvider
          - ProjectileBatteryAmmoProvider
        blacklist: # Frontier
          components: # Frontier
          - WizardStaffRechargeable # Frontier
          - BloodCultStaffRechargeable # Frontier
