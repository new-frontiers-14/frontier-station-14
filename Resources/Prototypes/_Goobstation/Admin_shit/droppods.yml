- type: entity
  parent: BaseItem
  id: DropPodspawner
  name: drop pod
  description: Place items you want players to recieve in the bag, activate it over where you want the pod to drop. Players cannot see the pod. To drop living beings, drag them into the pod.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/DropPod/item.rsi
    state: DROPPOD
  - type: Item
    size: Ginormous
  - type: Storage
    grid:
    - 0,0,20,20
    maxItemSize: Ginormous
  - type: Visibility
    layer: 2
  - type: DragInsertContainer
    containerId: clowncar_container
    entryDelay: 0
    useVerbs: false
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      clowncar_container: !type:Container
  - type: ExtendedContainer
    containerName: storagebase
    deleteContentsOnBreak: false
    capacity: 999
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ExplosionResistance
    damageCoefficient: 0
  - type: Damageable
    damageContainer: Inorganic
  - type: TriggerOnUse
  - type: TimerTrigger
    delay: 1
  - type: DamageOnTrigger
    damage:
      types:
        Slash: 250
    ignoreResistances: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          SpawnSupplyEmpty:
            min: 1
            max: 1
    - trigger:
        !type:DamageTrigger
        damage: 1100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
