- type: entity
  parent: [ClothingOuterWinterCoat, BaseCommandContraband]
  id: ClothingLongcoatCMO
  name: chief medical officer's longcoat
  description: A double-breasted longcoat with a green cross, specifically designed for the chief medical officer. Cut-resistant fibers provide some measure of protection against infectious bites.
  components:
  - type: Sprite
    sprite: _Floof/Clothing/OuterClothing/Longcoats/chief-medical-officer.rsi
  - type: Clothing
    sprite: _Floof/Clothing/OuterClothing/Longcoats/chief-medical-officer.rsi
  - type: Armor
    modifiers:
      coefficients:
        Slash: 0.9
        Heat: 0.9
        Caustic: 0.75
        Poison: 0.8

