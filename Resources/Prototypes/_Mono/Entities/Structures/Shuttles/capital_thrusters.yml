- type: entity
  parent: [BaseThruster, ConstructibleMachine]
  id: ThrusterLarge
  name: large thruster
  placement:
    mode: AlignTileAny
  components:
  - type: Machine
    board: LargeThrusterMachineCircuitboard
  - type: Construction
    graph: Machine2x2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 4500
      behaviors:
        - !type:DoActsBehavior
          acts: ["Destruction"]
        - !type:PlaySoundBehavior
          sound:
            collection: MetalBreak
        - !type:ChangeConstructionNodeBehavior
          node: machineFrame
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-1.45,1.45,0.45"
        density: 1750
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: ApcPowerReceiver
    powerLoad: 10000
  - type: Thruster
    thrust: 500 # Wayfarer: 800<500
    baseThrust: 500 # Wayfarer: 800<500
    thrustPerPartLevel: [530, 670, 810, 950] # Wayfarer
    burnShape: ["-0.3,0.5","0.2,1.6","0.8,1.6","1.3,0.5"]
    damage:
      types:
        Heat: 120
  - type: Sprite
    sprite: _Mono/Structures/Shuttles/thruster_large.rsi
    offset: 0.5,-0.5
    layers:
    - state: base
      map: ["enum.ThrusterVisualLayers.Base"]
    - state: thrust
      map: ["enum.ThrusterVisualLayers.ThrustOn"]
      shader: unshaded
      visible: false
    - state: thrust_burn_unshaded
      map: ["enum.ThrusterVisualLayers.ThrustingUnshaded"]
      shader: unshaded
      visible: false
      offset: 0, 2
  - type: Anchorable
    delay: 10
  - type: Rotatable
    rotateWhileAnchored: false
    increment: 90
  - type: StaticPrice
    price: 1500
  # Wayfarer: linkable thrusters
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
    - On
    - Off
    - Toggle
  # Wayfarer End
