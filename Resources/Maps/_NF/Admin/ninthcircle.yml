- proto: PaperColoredRed
  entities:
  - uid: 1529
    components:
    - type: MetaData
      name: Contract 1-A
    - type: Transform
      pos: -0.8534781,34.721252
      parent: 1
    - type: Paper
      content: >-
        [head=3][color=red]Contract 1-A[/color][/head]


        [bold]This contract, signed within the ninth circle of Hell, Hypatia sector, is an agreement between the Buyer and the Seller. Upon signing this contract, the Seller and Buyer shall undertake the following provisions. [/bold]


        [head=3]1)[/head] Hell, and the Devil, represented henceforth as the Buyer, shall issue a loan to the Seller in the form of abilities of a magical nature. These abilities shall exceed those of normal mortals in some way, and shall be granted for the full duration of the Seller's life, until the moment of the Seller's true death. The exact nature of this loan shall be dictated on the accompanying form, titled Contract 1-B.


        [head=3]2)[/head] The Seller undertakes before Hell and the Devil, the Buyer, to surrender some aspect of the Seller's being to the Buyer, fully and indivisibly in perpituity, either immediately or at the moment of the Seller's death. The nature of this aspect, or aspects, and the time of collection, shall be dictated on the accompanying form, titled Contract 1-B.


        [head=3]3)[/head] The Seller shall not use any abilities obtained as a result of signing this contract against the Buyer, or the Buyer's representatives. Any breach of the third clause of this contract shall incur a penalty in the form of the immediate collection of the Seller's soul, by means of mortification of the Seller.


        [head=3]4)[/head] Upon execution of the second clause of this contract, Hell, represented by The Devil, is free to do with the Seller's aspect(s) as it deems appropriate. All complaints regarding postpartem handling of these aspects in Hell shall be deemed null and void.


        [bold]Seller's Name: [/bold]

        - 


        [bold]Buyer's Name: [/bold]

        - 


        [bold]Time of Signing:

        [/bold]


        [italic][color=#ff0000]I hereby consent to the above agreement regarding the procurement and processing of my, the Seller's, aspect(s), and do hereby affirm that the signature on this contract is my, the Seller's, true name:[/color][/italic]
  - uid: 1531
    components:
    - type: MetaData
      name: Contract 1-B
    - type: Transform
      pos: -0.5722356,34.547684
      parent: 1
    - type: Paper
      content: >-
        [head=3][color=red]Contract 1-B[/color][/head]


        [bold]This form, when accompanying a signed Contract 1-A, dictates the terms of the arrangement between the Buyer and the Seller.[/bold]


        [color=red]──────────────────────────────────────────[/color]


        [bold]Hell, and the Devil, represented henceforth as the Buyer, offers the following options, as loans of magical power to the Seller. If none of the below are deemed appealing, negotiations for custom terms may be made.[/bold]


        - [bold]( ) Resuscitation:[/bold] In the event of the Seller's demise, they shall be granted [bold]one[/bold] additional chance at life. Their injuries shall be healed and they shall be restored to life.


        - [bold]( ) Invisibility:[/bold] The Seller shall gain a form of active camoflauge, allowing them to become nearly undetectable when remaining still. Movement disrupts this effect, but it recharges quickly.


        - [bold]( ) Resistance:[/bold] The Seller shall gain significant resistance or immunity to a form of bodily harm of their choice, such as (but not limited to) puncturing, burning, or radiation.


        - [bold]( ) Acceleration:[/bold] The Seller shall be granted enhanced speed and stamina, allowing them to outrun their foes and their attacks with ease.


        - [bold]( ) Custom:[/bold] This line may be filled with a custom loan at the Seller's request.


        [color=red]──────────────────────────────────────────[/color]


        [bold]The Seller, having chosen their desired loan, must then select an aspect of themselves to bargain with. This aspect, or aspects, must be of significant value to the Seller. The Buyer withholds the right to deny any offer made, for any reason. Below is an example list of aspects that are often considered acceptable.[/bold]


        - [bold]( ) Soul:[/bold] Upon the Seller's final death, their immortal soul shall be claimed by the Buyer, rendering their body un-reviveable, and their spirit unable to return.


        - [bold]( ) Voice:[/bold] Upon the signing of Contract 1-A, the Seller's voice shall be taken, rendering them permanently mute.


        - [bold]( ) Vitality:[/bold] Upon the signing of Contract 1-A, the Seller shall become more susceptible to a form of bodily harm, such as (but not limited to) puncturing, burning, or radiation.


        - [bold]( ) Stamina:[/bold] Upon the signing of Contract 1-A, the Seller shall become lethargic, moving at a slower pace than normal and being unable to maintain extended sprints.


        - [bold]( ) Form:[/bold] Upon the signing of Contract 1-A, the Seller shall be transformed into a lesser creature, such as a monkey, kobold, or scurret. 


        - [bold]( ) Spirituality:[/bold] Upon the signing of Contract 1-A, the Seller shall become one with the Hells, gaining the visage of the Devil himself. The Seller's connection to their faith will be severed, and they shall be harmed by proximity to sources of holy power.


        [color=red]──────────────────────────────────────────[/color]


        [italic][color=#ff0000]When the terms of the contract have been agreed upon by both parties, the Buyer and the Seller, sign below. This form is not legally binding unless bundled with Contract 1-A.[/color][/italic]
